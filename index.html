<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar: Akatosh Armor Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            background: rgba(0, 20, 40, 0.7);
            padding: 15px;
            border: 1px solid #00f2ff;
            border-radius: 8px;
            pointer-events: none;
            text-shadow: 0 0 5px #00f2ff;
        }
        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #00050a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
            z-index: 10;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 242, 255, 0.2);
            border-top: 5px solid #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Laddar rustningen från GitHub...</div>
    </div>

    <div id="ui">
        <b>MISSION: UTFORSKA SKOGEN</b><br>
        W / S - Gå framåt & bakåt<br>
        A / D - Sväng karaktären
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

   // --- 1. SCEN & RENDERER ---
const scene = new THREE.Scene();
const skyColor = 0x4488ff; // En klarare blå
scene.background = new THREE.Color(skyColor);
scene.fog = new THREE.Fog(skyColor, 10, 150); // Linjär dimma för bättre sikt

// --- 2. BELYSNING ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(skyColor, 0x081108, 0.8);
scene.add(hemiLight);

const moonLight = new THREE.DirectionalLight(0xffffff, 1.5);
moonLight.position.set(50, 100, 50);
moonLight.castShadow = true;
scene.add(moonLight);

        // --- 3. MILJÖ (MARKEN & TRÄD) ---
        const groundGeo = new THREE.CircleGeometry(100, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a140a });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Skapa en enkel skog
        const treeCount = 150;
        for(let i = 0; i < treeCount; i++) {
            const tree = new THREE.Group();
            
            // Stam
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.3, 4), 
                new THREE.MeshStandardMaterial({color: 0x1a0d00})
            );
            
            // Krona (Självlysande blad för Avatar-känsla)
            const leaves = new THREE.Mesh(
                new THREE.IcosahedronGeometry(Math.random() * 2 + 1), 
                new THREE.MeshStandardMaterial({
                    color: 0x00ffaa, 
                    emissive: 0x002211,
                    transparent: true,
                    opacity: 0.8
                })
            );
            leaves.position.y = 3;
            
            tree.add(trunk, leaves);
            tree.position.set(
                Math.random() * 160 - 80, 
                2, 
                Math.random() * 160 - 80
            );
            scene.add(tree);
        }

        // --- 4. KARAKTÄR (DIN GLB-FIL) ---
        let player = new THREE.Group(); 
        scene.add(player);

        const loader = new GLTFLoader();
        // Justera filnamnet här om det behövs
        const modelUrl = 'gifts_of_akatosh_armor.glb'; 

        loader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            
            // JUSTERING: Om du såg "inifrån" modellen kan vi skala ner den och flytta ner den
            model.scale.set(1.5, 1.5, 1.5); 
            model.position.y = 0; // Se till att fötterna är på marken
            
            model.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            player.add(model);
            document.getElementById('loading-screen').style.display = 'none';
        }, 
        (xhr) => {
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('status').innerText = `Laddar rustningen: ${percent}%`;
        },
        (error) => {
            console.error(error);
            document.getElementById('status').innerText = "Kunde inte ladda GLB-filen. Kontrollera filnamnet!";
        });

        // --- 5. RÖRELSE-LOGIK ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updatePlayer() {
            const moveSpeed = 0.15;
            const rotateSpeed = 0.04;

            if (keys['KeyW']) player.translateZ(-moveSpeed);
            if (keys['KeyS']) player.translateZ(moveSpeed);
            if (keys['KeyA']) player.rotation.y += rotateSpeed;
            if (keys['KeyD']) player.rotation.y -= rotateSpeed;

            // TREDJEPERSONS-KAMERA (Följer bakom)
            // Vi skapar en position 8 enheter bakom och 4 enheter uppåt från spelaren
            const cameraOffset = new THREE.Vector3(0, 4, 8); 
            const actualOffset = cameraOffset.applyMatrix4(player.matrixWorld);

            camera.position.lerp(actualOffset, 0.1); // "lerp" gör kamerarörelsen mjuk
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);
        }

        // --- 6. ANIMATIONSLOOP ---
        function animate() {
            requestAnimationFrame(animate);
            updatePlayer();
            renderer.render(scene, camera);
        }

        animate();

        // Hantera fönsterstorlek
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
