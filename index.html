<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Avatar - Tredjepersonsperspektiv</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #4488ff; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; font-family: sans-serif; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">Använd WASD för att gå. Om du ser inifrån, prova att backa med S!</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const skyColor = 0x4488ff;
        scene.background = new THREE.Color(skyColor);
        scene.fog = new THREE.Fog(skyColor, 1, 150);

        // KAMERA: Starta långt bakom (Z = 15)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // LJUS
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // MARKEN
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x113311 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // SPELAR-GRUPP (Denna flyttar vi på)
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // LADDA MODELLEN
        const loader = new GLTFLoader();
        loader.load('gifts_of_akatosh_armor.glb', (gltf) => {
            const model = gltf.scene;
            
            // SKALA OCH POSITION: 
            // Om modellen är enorm, ändra till 0.5 eller lägre
            model.scale.set(0.3, 0.3, 0.3); 
            
            // VIKTIGT: Flytta modellen 1 enhet framåt så kameran (i 0,0,0 i gruppen) hamnar bakom
            model.position.z = -1; 
            
            playerGroup.add(model);
        }, undefined, (err) => {
            // Om GLB misslyckas, visa en blå gubbe så du ser att det fungerar ändå
            const fallback = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1), new THREE.MeshStandardMaterial({color: 0x0000ff}));
            fallback.position.y = 1;
            playerGroup.add(fallback);
        });

        // KONTROLLER
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);

            const speed = 0.15;
            const rotSpeed = 0.05;

            if (keys['KeyW']) playerGroup.translateZ(-speed);
            if (keys['KeyS']) playerGroup.translateZ(speed);
            if (keys['KeyA']) playerGroup.rotation.y += rotSpeed;
            if (keys['KeyD']) playerGroup.rotation.y -= rotSpeed;

            // KAMERA-FÖLJNING:
            // Vi skapar en position bakom spelaren
            const idealOffset = new THREE.Vector3(0, 4, 8); // 4 upp, 8 bakom
            idealOffset.applyMatrix4(playerGroup.matrixWorld);

            // Mjuk rörelse till den ideala positionen
            camera.position.lerp(idealOffset, 0.1);
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.5, playerGroup.position.z);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
