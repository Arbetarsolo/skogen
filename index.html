<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar 3D - Full View Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #4488ff; font-family: sans-serif; }
        #loader {
            position: absolute; width: 100%; height: 100%;
            background: #001122; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: #00f2ff; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader"><h1 id="status">Anpassar kameran...</h1></div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. SCEN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4488ff);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LJUS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 50, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- 3. MARKEN ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x113311 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- 4. KARAKTÄR ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const loader = new GLTFLoader();
        loader.load('gifts_of_akatosh_armor.glb', (gltf) => {
            const model = gltf.scene;
            
            // AUTOMATISK SKALNING & CENTRERING
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim; // Gör den ca 4 enheter hög
            model.scale.set(scale, scale, scale);
            
            // VIKTIGT: Flytta modellen så att fötterna hamnar exakt på marken (y=0)
            model.position.y = -box.min.y * scale; 
            
            // Vrid modellen så ryggen är mot kameran
            model.rotation.y = Math.PI; 

            playerGroup.add(model);
            document.getElementById('loader').style.display = 'none';
        }, undefined, (err) => {
            console.error(err);
            document.getElementById('loader').innerHTML = "<h1>Kunde inte ladda GLB-filen!</h1>";
        });

        // --- 5. STYRNING ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- 6. ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);

            const moveSpeed = 0.2;
            const rotSpeed = 0.05;

            if (keys['KeyW']) playerGroup.translateZ(moveSpeed);
            if (keys['KeyS']) playerGroup.translateZ(-moveSpeed);
            if (keys['KeyA']) playerGroup.rotation.y += rotSpeed;
            if (keys['KeyD']) playerGroup.rotation.y -= rotSpeed;

            // KAMERA-INSTÄLLNING (Tredjeperson)
            // Vi sätter kameran 6 enheter UPP (y) och 15 enheter BAKÅT (z)
            const relativeOffset = new THREE.Vector3(0, 6, -15);
            const cameraOffset = relativeOffset.applyMatrix4(playerGroup.matrixWorld);

            camera.position.lerp(cameraOffset, 0.1); // Mjuk följning

            // Titta på en punkt mitt på karaktären (y + 3)
            const lookAtTarget = new THREE.Vector3(
                playerGroup.position.x,
                playerGroup.position.y + 3,
                playerGroup.position.z
            );
            camera.lookAt(lookAtTarget);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
