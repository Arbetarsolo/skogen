<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar 3D - Forest Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #4488ff; font-family: sans-serif; }
        #loader {
            position: absolute; width: 100%; height: 100%;
            background: #001122; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: #00f2ff; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader"><h1 id="status">Laddar rustning...</h1></div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. SCEN ---
        const scene = new THREE.Scene();
        const skyColor = 0x4488ff;
        scene.background = new THREE.Color(skyColor);
        // Vi tar bort dimman (fog) tillfälligt så vi ser allt tydligt
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LJUS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- 3. MARKEN ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x113311 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- 4. KARAKTÄR ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const loader = new GLTFLoader();
        loader.load('gifts_of_akatosh_armor.glb', (gltf) => {
            const model = gltf.scene;
            
            // AUTOMATISK SKALNING (Viktigt!)
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3 / maxDim; // Gör modellen 3 enheter hög
            model.scale.set(scale, scale, scale);
            
            // Centrera modellen
            model.position.y = 0;
            model.rotation.y = Math.PI; 

            playerGroup.add(model);
            document.getElementById('loader').style.display = 'none';
            console.log("Modell laddad och skalad!");
        }, undefined, (err) => {
            console.error(err);
            // Om GLB dör, visa en röd box så du ser om koden i övrigt funkar
            const box = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
            box.position.y = 1;
            playerGroup.add(box);
            document.getElementById('loader').style.display = 'none';
        });

        // --- 5. STYRNING ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- 6. ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);

            if (keys['KeyW']) playerGroup.translateZ(0.2);
            if (keys['KeyS']) playerGroup.translateZ(-0.2);
            if (keys['KeyA']) playerGroup.rotation.y += 0.05;
            if (keys['KeyD']) playerGroup.rotation.y -= 0.05;

            // KAMERA SOM ALLTID HÅLLER AVSTÅND
            // Vi placerar kameran 10 enheter bakom och 5 enheter upp relativt till spelaren
            const relativeOffset = new THREE.Vector3(0, 5, -12);
            const cameraOffset = relativeOffset.applyMatrix4(playerGroup.matrixWorld);

            camera.position.x = cameraOffset.x;
            camera.position.y = cameraOffset.y;
            camera.position.z = cameraOffset.z;

            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 2, playerGroup.position.z);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
