<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Avatar 3D - Animated Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #4488ff; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; background: rgba(0, 20, 40, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #00f2ff; pointer-events: none; }
        #loader { position: absolute; width: 100%; height: 100%; background: #00050a; display: flex; justify-content: center; align-items: center; color: #00f2ff; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader"><h1>Laddar animationer...</h1></div>
    <div id="ui"><b>KONTROLLER:</b><br>W / S - Gå & Animera<br>A / D - Sväng</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCEN & KLOCKA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4488ff);
        const clock = new THREE.Clock(); // Behövs för animationer

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // Mark
        const ground = new THREE.Mesh(new THREE.CircleGeometry(300, 32), new THREE.MeshStandardMaterial({ color: 0x051a05 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- KARAKTÄR & ANIMATION VARIABLER ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        let mixer; // AnimationMixer
        let actions = {}; // Håller våra animationer (Idle, Walk, etc)
        let activeAction;
        let modelLoaded = false;

        const loader = new GLTFLoader();
        loader.load('gifts_of_akatosh_armor.glb', (gltf) => {
            const model = gltf.scene;
            
            // Skalning
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 5 / size.y; 
            model.scale.set(scale, scale, scale);
            model.position.y = -box.min.y * scale; 

            // Rotation-fix container
            const modelContainer = new THREE.Group();
            modelContainer.add(model);
            modelContainer.rotation.y = Math.PI; 
            playerGroup.add(modelContainer);

            // --- ANIMATIONS-LOGIK ---
            mixer = new THREE.AnimationMixer(model);
            
            // Logga alla animationer i konsolen så du ser vad de heter!
            console.log("Animationer hittade:", gltf.animations.map(a => a.name));

            gltf.animations.forEach((clip) => {
                const action = mixer.clipAction(clip);
                actions[clip.name] = action;
            });

            // Starta med den första animationen (ofta "Idle")
            if (gltf.animations.length > 0) {
                activeAction = actions[gltf.animations[0].name];
                activeAction.play();
            }

            modelLoaded = true;
            document.getElementById('loader').style.display = 'none';
        });

        // Styrning
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Funktion för att byta animation mjukt
        function fadeToAction(name, duration = 0.2) {
            if (!actions[name] || activeAction === actions[name]) return;
            const previousAction = activeAction;
            activeAction = actions[name];
            if (previousAction) previousAction.fadeOut(duration);
            activeAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(duration).play();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta(); // Tid sedan förra framen

            if (modelLoaded) {
                if (mixer) mixer.update(dt); // Uppdatera animationen!

                const moveSpeed = 0.3;
                const rotSpeed = 0.05;

                // Enkel logik: Om vi går, byt till animation nr 2 (ofta Walk)
                // OBS: Du kan behöva ändra namnen "Walk" eller "Run" nedan!
                if (keys['KeyW'] || keys['KeyS']) {
                    playerGroup.translateZ(keys['KeyW'] ? moveSpeed : -moveSpeed);
                    // fadeToAction('Walk'); // Avkommentera och byt till rätt namn från konsolen
                } else {
                    // fadeToAction('Idle'); // Avkommentera och byt till rätt namn från konsolen
                }

                if (keys['KeyA']) playerGroup.rotation.y += rotSpeed;
                if (keys['KeyD']) playerGroup.rotation.y -= rotSpeed;
            }

            // Kamera
            const relativeOffset = new THREE.Vector3(0, 8, -20);
            const cameraOffset = relativeOffset.applyMatrix4(playerGroup.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 3, playerGroup.position.z);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
